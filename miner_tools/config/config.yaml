# Jarvis Miner — R-01 Registration Price Monitor Config
#
# ══════════════════════════════════════════════════════════════════════════
# FULL SETUP (do these steps in order)
# ══════════════════════════════════════════════════════════════════════════
#
# STEP 1: Create a bittensor wallet (if you don't have one)
#
#   btcli wallet new_coldkey   --wallet.name jarvis --wallet.path ~/.bittensor/wallets
#   btcli wallet new_hotkey    --wallet.name jarvis --wallet.hotkey miner1 --wallet.path ~/.bittensor/wallets
#
#   This creates:
#     ~/.bittensor/wallets/jarvis/coldkeypub.txt  (your TAO address)
#     ~/.bittensor/wallets/jarvis/hotkeys/miner1  (your neuron key)
#
# STEP 2: Fund your coldkey with TAO
#
#   btcli wallet overview --wallet.name jarvis
#   # Copy the coldkey SS58 address, send TAO to it from an exchange
#
# STEP 3: Set environment variables (for alerts)
#
#   export DISCORD_WEBHOOK="https://discord.com/api/webhooks/YOUR_WEBHOOK"
#   export TELEGRAM_BOT_TOKEN="123456:ABC-DEF..."
#   export TELEGRAM_USER_ID="5261349563"
#
# STEP 4: Update the wallet section below to match your wallet
#
# STEP 5: Verify everything is ready
#
#   jarvis wallet          # check wallet exists, balance, registrations
#   jarvis validate        # validate config
#   jarvis price           # check current prices
#
# STEP 6: Run the monitor
#
#   jarvis-miner watch           # starts monitoring + auto-register + deregister alerts
#
# ══════════════════════════════════════════════════════════════════════════

global:
  subtensor_network: finney
  price_source: auto
  data_dir: data
  log_level: INFO
  max_history_days: 30
  trend_window: 6
  alert_cooldown_seconds: 600
  discord_username: Jarvis Miner

  # ── WALLET ────────────────────────────────────────────────────────
  # Must match a wallet created with btcli (see setup above)
  # jarvis wallet — check if this wallet exists and has balance
  wallet:
    name: jarvis          # wallet name (--wallet.name when creating)
    hotkey: miner1        # hotkey name (--wallet.hotkey when creating)
    path: ~/.bittensor/wallets

  # ── ALERTS ───────────────────────────────────────────────────────
  alerts:
    channel: both
    discord:
      webhook_url: "${DISCORD_WEBHOOK}"
    telegram:
      bot_token: "${TELEGRAM_BOT_TOKEN}"
      chat_id: "${TELEGRAM_USER_ID}"

# ── SUBNETS ─────────────────────────────────────────────────────────
#
# Per-subnet options:
#   price_threshold_tao  — alert when price drops to or below this
#   max_spend_tao        — max TAO to spend (safety limit)
#   auto_register: true  — automatically register when price <= threshold
#                          (requires wallet with TAO balance)
#   deregister:          — monitor hotkeys for deregistration
#     - hotkey: "5D..."  — SS58 address of the hotkey to watch
#       label: "Miner-1" — friendly name for alerts
#
subnets:
  - netuid: 6
    nickname: "Numinous"
    price_threshold_tao: 0.5
    max_spend_tao: 1.0
    enabled: true
    # auto_register: true
    # deregister:
    #   - hotkey: "5GrwvaEF5zXb26Fz9rcQpDWS57CtERHpNehXCPcNoHGKutQY"
    #     label: "Miner-1"

  - netuid: 8
    nickname: "Vanta"
    price_threshold_tao: 0.4
    max_spend_tao: 0.8
    enabled: true

  - netuid: 9
    nickname: "Pretraining"
    price_threshold_tao: 1.0
    max_spend_tao: 2.0
    enabled: true

  - netuid: 13
    nickname: "Data Universe"
    price_threshold_tao: 0.8
    max_spend_tao: 1.5
    enabled: true

  - netuid: 18
    nickname: "Zeus"
    price_threshold_tao: 0.25
    max_spend_tao: 0.5
    enabled: true

  - netuid: 28
    nickname: "S&P Oracle"
    price_threshold_tao: 0.4
    max_spend_tao: 0.8
    enabled: true

  - netuid: 37
    nickname: "Finetuning"
    price_threshold_tao: 0.8
    max_spend_tao: 1.5
    enabled: true

  - netuid: 41
    nickname: "Sports Tensor"
    price_threshold_tao: 0.2
    max_spend_tao: 0.4
