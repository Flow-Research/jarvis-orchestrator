version: 2.1

jobs:
  tests:
    docker:
      - image: cimg/python:3.12
    resource_class: medium
    environment:
      ARROW_USER_SIMD_LEVEL: NONE
    steps:
      - checkout

      - setup_remote_docker:
          docker_layer_caching: true

      - restore_cache:
          keys:
            - uv-v1-{{ checksum "uv.lock" }}
            - uv-v1-

      - run:
          name: Install uv
          command: |
            python -m pip install --upgrade pip
            python -m pip install uv

      - run:
          name: Install dependencies
          command: uv sync --dev --frozen

      - save_cache:
          key: uv-v1-{{ checksum "uv.lock" }}
          paths:
            - ~/.cache/uv

      - run:
          name: Verify Docker for Testcontainers
          command: docker info

      - run:
          name: Run lint
          command: |
            uv run ruff check \
              cli/main.py \
              workstream \
              subnets/sn13 \
              tests/test_cli.py \
              tests/test_workstream.py \
              tests/test_workstream_api.py \
              tests/test_sn13_*.py \
              tests/test_engineering_governance.py \
              scripts/validate_external_skills.py

      - run:
          name: Validate external operator skills
          command: uv run python scripts/validate_external_skills.py

      - run:
          name: Run unit tests with coverage gate
          command: |
            uv run pytest -q tests -m 'not integration' \
              --cov=subnets.sn13 \
              --cov=workstream \
              --cov-report=term-missing \
              -W error::ResourceWarning

      - run:
          name: Run Testcontainers integration tests
          command: uv run pytest -q -m integration tests/test_sn13_testcontainers.py

workflows:
  test:
    jobs:
      - tests
