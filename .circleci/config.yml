version: 2.1

jobs:
  tests:
    docker:
      - image: cimg/python:3.12
    resource_class: medium
    environment:
      ARROW_USER_SIMD_LEVEL: NONE
    steps:
      - checkout

      - setup_remote_docker:
          docker_layer_caching: true

      - restore_cache:
          keys:
            - uv-v1-{{ checksum "uv.lock" }}
            - uv-v1-

      - run:
          name: Install uv
          command: |
            python -m pip install --upgrade pip
            python -m pip install uv

      - run:
          name: Install dependencies
          command: uv sync --dev --frozen

      - save_cache:
          key: uv-v1-{{ checksum "uv.lock" }}
          paths:
            - ~/.cache/uv

      - run:
          name: Verify Docker for Testcontainers
          command: docker info

      - run:
          name: Run unit tests
          command: |
            uv run pytest -q \
              tests/test_cli.py \
              tests/test_engineering_governance.py \
              tests/test_workstream.py \
              tests/test_operator_api.py \
              tests/test_sn13_export.py \
              tests/test_sn13_protocol_adapter.py \
              tests/test_sn13_storage.py \
              tests/test_sn13_tasks.py \
              tests/test_sn13_planner.py \
              tests/test_sn13_quality.py \
              tests/test_sn13_desirability.py \
              tests/test_sn13_policy.py \
              tests/test_sn13_contract.py \
              tests/test_sn13_protocol_observer.py \
              tests/test_sn13_economics.py \
              tests/test_sn13_gravity.py \
              tests/test_sn13_readiness.py \
              tests/test_sn13_simulator.py \
              tests/test_sn13_workstream.py \
              --cov=operator_api \
              --cov=subnets.sn13 \
              --cov=workstream \
              --cov-report=term-missing

      - run:
          name: Run Testcontainers integration tests
          command: uv run pytest -q -m integration tests/test_sn13_testcontainers.py

workflows:
  test:
    jobs:
      - tests
