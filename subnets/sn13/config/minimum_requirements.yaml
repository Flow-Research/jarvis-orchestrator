# SN13 minimum readiness profile for Jarvis.
#
# This file intentionally separates upstream-confirmed miner requirements from
# Jarvis-owned economic/operator gates. Upstream docs do not publish exact disk,
# RAM, CPU, or monthly cost floors; the numeric resource values here are Jarvis
# pilot gates used to avoid accepting work the system cannot store or deliver.

schema_version: 1
subnet:
  name: Data Universe
  netuid: 13
  supported_networks:
    - test
    - finney

upstream_confirmed:
  python_min_version: "3.10"
  gpu_required: false
  wallet_required: true
  registered_hotkey_required: true
  online_miner_required_for_validator_requests: true
  local_database_required: true
  s3_upload_requires_hotkey_signature: true
  s3_auth_url_default: "https://data-universe-api.api.macrocosmos.ai"
  source_access:
    x:
      minimum_one_of:
        - env: APIFY_API_TOKEN
          description: Apify token for X/Twitter scraper actors.
        - env: JARVIS_SN13_X_OPERATOR_ENDPOINT
          description: Jarvis-managed external X operator provider.
    reddit:
      minimum_one_of:
        - env: APIFY_API_TOKEN
          description: Apify token for Reddit scraper actors.
        - env_group:
            - REDDIT_CLIENT_ID
            - REDDIT_CLIENT_SECRET
            - REDDIT_USERNAME
            - REDDIT_PASSWORD
          description: Free personal Reddit OAuth/script account path.
        - env: JARVIS_SN13_REDDIT_OPERATOR_ENDPOINT
          description: Jarvis-managed external Reddit operator provider.

jarvis_economic_gates:
  disk_free_gb_blocker: 10
  disk_free_gb_recommended: 50
  min_operator_quality_score: 0.8
  min_operator_daily_capacity_items: 100
  require_operator_cost_budget: true
  require_rate_limit_budget: true
  require_terms_compliant_source_access: true
  require_source_specific_credentials_before_assignment: true

capability_gates:
  can_serve_validators:
    requires:
      - python_at_or_above_minimum
      - wallet_configured
      - hotkey_registered_on_subnet
      - listener_running_online
      - local_db_healthy
      - disk_above_blocker_floor
  jarvis_can_intake_operator_uploads:
    requires:
      - local_db_healthy
      - disk_above_blocker_floor
      - operator_budget_available
      - operator_quality_floor
      - operator_daily_capacity_floor
  jarvis_can_publish_x_operator_tasks:
    requires:
      - can_serve_validators
      - x_source_access_configured
      - operator_budget_available
      - operator_quality_floor
      - operator_daily_capacity_floor
  jarvis_can_publish_reddit_operator_tasks:
    requires:
      - can_serve_validators
      - reddit_source_access_configured
      - operator_budget_available
      - operator_quality_floor
      - operator_daily_capacity_floor
  jarvis_can_export_upstream_s3:
    requires:
      - can_serve_validators
      - s3_auth_url_configured
      - wallet_hotkey_can_sign
      - parquet_export_available
  jarvis_can_archive_to_jarvis_s3:
    requires:
      - parquet_export_available
      - jarvis_archive_bucket_configured
